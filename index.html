<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glow House</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #fdf6ee;
      --petal:    #f5c6c6;
      --blush:    #e8a0a0;
      --rose:     #c8606a;
      --deep:     #3a1f22;
      --ink:      #5c3a3e;
      --mist:     #f0e8e8;
      --gold:     #c9a96e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 64px 24px 48px;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 500;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s forwards;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      color: var(--deep);
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s 0.25s forwards;
    }

    .brand-name em {
      font-style: italic;
      color: var(--rose);
    }

    .tagline {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--blush);
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
    }

    /* ── ENTER PRODUCT BUTTON ── */
    .header-actions {
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s forwards;
    }

    .btn-enter-product {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--rose);
      border: 1.5px solid var(--petal);
      padding: 11px 26px;
      border-radius: 30px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease,
                  color 0.25s ease, transform 0.15s ease,
                  box-shadow 0.25s ease;
    }

    .btn-enter-product:hover {
      background: var(--rose);
      border-color: var(--rose);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(200, 96, 106, 0.28);
    }

    .btn-enter-product svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s ease;
    }

    .btn-enter-product:hover svg {
      transform: translateX(2px);
    }

    /* ── GRID ── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1060px;
      margin: 52px auto 80px;
      padding: 0 24px;
    }

    /* ── LOADING / ERROR STATES ── */
    .state-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      color: var(--blush);
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .state-message .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--mist);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(58,31,34,0.07);
      transition: transform 0.35s cubic-bezier(0.25,0.8,0.25,1),
                  box-shadow 0.35s ease;
      opacity: 0;
      animation: fadeUp 0.6s forwards;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 14px 40px rgba(58,31,34,0.13);
    }

    .card-badge {
      position: absolute;
      top: 14px; left: 14px;
      background: var(--rose);
      color: #fff;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 2;
    }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--mist);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.06);
    }

    .card-body {
      padding: 20px 22px 22px;
    }

    .card-brand {
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blush);
      font-weight: 500;
      margin-bottom: 6px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--deep);
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 12.5px;
      color: #9c7a7e;
      line-height: 1.6;
      font-weight: 300;
      margin-bottom: 18px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--rose);
    }

    .btn-add {
      background: var(--deep);
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 30px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.15s ease;
    }

    .btn-add:hover {
      background: var(--rose);
      transform: scale(1.04);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px;
      font-size: 12px;
      color: var(--blush);
      letter-spacing: 0.06em;
      border-top: 1px solid var(--mist);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .shop-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .card-body { padding: 14px 14px 16px; }
      .card-name { font-size: 0.88rem; }
    }
    @media (max-width: 380px) {
      .shop-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">✦ Seoul-Crafted Skincare ✦</p>
  <h1 class="brand-name">글로우 하우스<br><em>Glow House</em></h1>
  <p class="tagline">Curated K-Beauty for Glass Skin</p>
  <div class="header-actions">
    <a href="add-product.html" class="btn-enter-product">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Enter Product
    </a>
  </div>
</header>

<main>
  <div class="shop-grid" id="shop-grid">
    <!-- Loading state -->
    <div class="state-message" id="loading-state">
      <div class="spinner"></div>
      Loading products…
    </div>
  </div>
</main>

<footer>
  <p>© 2026 글로우 하우스 Glow House · Handpicked in Seoul · Free shipping over ₩50,000</p>
</footer>

<script>
  const SHEET_CSV_URL =
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOYWEJcjX_yH252EYj516yLHxj-nvHmU9A85V9nzBDhDjUTUAdV49qqcVxNsFS-6nYPcsZTgxEf1-W/pub?output=csv';

  /* ── Minimal CSV parser that handles quoted fields with commas/newlines ── */
  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      const next = text[i + 1];

      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { row.push(field); field = ''; }
        else if (ch === '\n' || (ch === '\r' && next === '\n')) {
          if (ch === '\r') i++;
          row.push(field); field = '';
          if (row.some(Boolean)) rows.push(row);
          row = [];
        } else { field += ch; }
      }
    }
    // last field / row
    row.push(field);
    if (row.some(Boolean)) rows.push(row);

    return rows;
  }

  function csvToObjects(rows) {
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim().toLowerCase());
    return rows.slice(1).map(cols => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
      return obj;
    });
  }

  function createCard(product, index) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${0.5 + index * 0.12}s`;

    const badgeHTML = product.badge
      ? `<span class="card-badge">${escHtml(product.badge)}</span>`
      : '';

    const imgSrc = product.img || '';
    const altText = escHtml(product.name);

    card.innerHTML = `
      ${badgeHTML}
      <div class="card-img-wrap">
        <img src="${escAttr(imgSrc)}" alt="${altText}" loading="lazy" />
      </div>
      <div class="card-body">
        <p class="card-brand">${escHtml(product.brand)}</p>
        <h2 class="card-name">${escHtml(product.name)}</h2>
        <p class="card-desc">${escHtml(product.desc)}</p>
        <div class="card-footer">
          <span class="price">${escHtml(product.price)}</span>
          <button class="btn-add">Add to Bag</button>
        </div>
      </div>
    `;

    return card;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    return String(str).replace(/"/g, '&quot;');
  }

  async function loadProducts() {
    const grid = document.getElementById('shop-grid');
    const loader = document.getElementById('loading-state');

    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();

      const rows = parseCSV(text);
      const products = csvToObjects(rows);

      if (!products.length) throw new Error('No products found in sheet');

      // Remove loader
      loader.remove();

      // Render cards
      products.forEach((product, i) => {
        grid.appendChild(createCard(product, i));
      });

    } catch (err) {
      loader.innerHTML = `
        <p style="color:var(--rose); margin-bottom:8px;">Could not load products.</p>
        <p style="font-size:12px; opacity:0.7;">${escHtml(err.message)}</p>
      `;
      console.error('Sheet fetch error:', err);
    }
  }

  loadProducts();
</script>

</body>
</html>
